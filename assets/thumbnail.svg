<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" rx="80" fill="#111111"/>

  <!-- Lines: centre to satellites -->
  <line x1="250" y1="215" x2="188" y2="163" stroke="#C0C0C0" stroke-width="10" stroke-linecap="round"/>
  <line x1="250" y1="215" x2="312" y2="163" stroke="#C0C0C0" stroke-width="10" stroke-linecap="round"/>
  <line x1="250" y1="250" x2="250" y2="330" stroke="#C0C0C0" stroke-width="10" stroke-linecap="round"/>
  <!-- Line: bottom satellite to 4th satellite -->
  <line x1="265" y1="322" x2="308" y2="293" stroke="#C0C0C0" stroke-width="9" stroke-linecap="round"/>

  <!-- Flow dots -->
  <circle cx="217" cy="187" r="13" fill="#FF6B00"/>
  <circle cx="283" cy="187" r="13" fill="#FF6B00"/>
  <circle cx="250" cy="290" r="13" fill="#FF6B00"/>
  <circle cx="287" cy="307" r="11" fill="#FF6B00"/>

  <!-- Centre node  orange -->
  <circle cx="250" cy="232" r="62" fill="#FF6B00"/>

  <!-- Top-left satellite  large silver -->
  <circle cx="180" cy="150" r="44" fill="#C0C0C0"/>
  <!-- Top-right satellite  large silver -->
  <circle cx="320" cy="150" r="44" fill="#C0C0C0"/>
  <!-- Bottom satellite  large silver, perpendicular -->
  <circle cx="250" cy="342" r="44" fill="#C0C0C0"/>
  <!-- 4th satellite  smaller dark silver, up and right -->
  <circle cx="318" cy="280" r="34" fill="#888888"/>
</svg>
