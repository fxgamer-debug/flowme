version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Keep vitest + @vitest/* on the same major; separate bumps often break npm ci / CI.
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      # Vite 8 expects compatible esbuild as peer for workers/minify — bump together.
      vite:
        patterns:
          - 'vite'
          - 'esbuild'
      # typescript-eslint meta-package + scoped plugins/parser stay aligned.
      typescript-eslint:
        patterns:
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      # ESLint 10+ does not bundle @eslint/js — flat config imports it explicitly.
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/js'
