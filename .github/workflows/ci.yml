name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check (src)
        run: npm run type-check

      - name: Type check (tests)
        run: npm run type-check:tests

      - name: Unit + smoke tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Ensure dist/ is up to date
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            exit 1
          fi
