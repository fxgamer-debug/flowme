<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowMe Dev — Local Preview</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #card-wrap {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow: auto;
      }
      flowme-card {
        width: 100%;
        max-width: 900px;
      }
    </style>
  </head>
  <body>
    <div id="card-wrap">
      <flowme-card id="card"></flowme-card>
    </div>
    <script type="module" src="/src/dev/demo-app.ts"></script>
  </body>
</html>
